<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPTX Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e8eaf6;
    }

    .tab {
      flex: 1;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #888;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover { color: #4f6ef7; }

    .tab.active {
      color: #4f6ef7;
      border-bottom-color: #4f6ef7;
    }

    /* Content */
    .content {
      padding: 32px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #4f6ef7;
      background: #f0f4ff;
    }

    .drop-zone .icon { font-size: 2.2rem; margin-bottom: 8px; }
    .drop-zone .label { font-size: 0.9rem; color: #444; margin-bottom: 4px; }
    .drop-zone .hint { font-size: 0.78rem; color: #aaa; }

    #file-input { display: none; }

    .filename {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #4f6ef7;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }

    .convert-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      background: #4f6ef7;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .convert-btn:hover:not(:disabled) { background: #3a58e0; }
    .convert-btn:disabled { background: #b0bce8; cursor: not-allowed; }

    /* Progress */
    .progress-section { margin-top: 20px; }

    .progress-label {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 7px;
      min-height: 16px;
    }

    .progress-track {
      background: #e8eaf6;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f6ef7, #7c9bff);
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    .progress-fill.active {
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .error-box {
      margin-top: 14px;
      padding: 11px 14px;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 8px;
      color: #c0392b;
      font-size: 0.82rem;
    }

    .success-box {
      margin-top: 14px;
      padding: 11px 14px;
      background: #f0fff4;
      border: 1px solid #a3d9a5;
      border-radius: 8px;
      color: #276749;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="jpeg">JPEG Slides</div>
      <div class="tab" data-tab="pdf">PDF</div>
    </div>

    <div class="content">
      <p class="subtitle" id="subtitle">
        Converts each slide — including animation click states — into separate JPEG images, bundled as a ZIP.
      </p>

      <div class="drop-zone" id="drop-zone">
        <div class="icon">📂</div>
        <div class="label">Drag &amp; drop your .pptx file here</div>
        <div class="hint">or click to browse</div>
      </div>
      <input type="file" id="file-input" accept=".pptx" />

      <div class="filename" id="filename"></div>

      <button class="convert-btn" id="convert-btn" disabled>Convert &amp; Download ZIP</button>

      <div class="progress-section" id="progress-section" hidden>
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="error-box" id="error-box" hidden></div>
      <div class="success-box" id="success-box" hidden></div>
    </div>
  </div>

  <script>
    const tabs           = document.querySelectorAll('.tab');
    const subtitleEl     = document.getElementById('subtitle');
    const dropZone       = document.getElementById('drop-zone');
    const fileInput      = document.getElementById('file-input');
    const filenameEl     = document.getElementById('filename');
    const convertBtn     = document.getElementById('convert-btn');
    const progressSection = document.getElementById('progress-section');
    const progressLabel  = document.getElementById('progress-label');
    const progressFill   = document.getElementById('progress-fill');
    const errorBox       = document.getElementById('error-box');
    const successBox     = document.getElementById('success-box');

    const TAB_CONFIG = {
      jpeg: {
        subtitle: 'Converts each slide — including animation click states — into separate JPEG images, bundled as a ZIP.',
        btnText:  'Convert & Download ZIP',
        endpoint: '/convert',
      },
      pdf: {
        subtitle: 'Converts the PowerPoint file into a single PDF, preserving fonts and layout.',
        btnText:  'Convert & Download PDF',
        endpoint: '/convert-pdf',
      },
    };

    let activeTab = 'jpeg';
    let selectedFile = null;

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        const cfg = TAB_CONFIG[activeTab];
        subtitleEl.textContent = cfg.subtitle;
        convertBtn.textContent = cfg.btnText;
        // Keep selected file — just reset status displays
        progressSection.hidden = true;
        errorBox.hidden = true;
        successBox.hidden = true;
        setProgress(0, '');
      });
    });

    // File selection
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    function setFile(f) {
      if (!f.name.toLowerCase().endsWith('.pptx')) { showError('Please select a .pptx file.'); return; }
      selectedFile = f;
      filenameEl.textContent = f.name;
      convertBtn.disabled = false;
      errorBox.hidden = true;
      successBox.hidden = true;
      progressSection.hidden = true;
      setProgress(0, '');
    }

    function setProgress(pct, label) {
      progressFill.style.width = pct + '%';
      progressLabel.textContent = label;
      if (pct > 0 && pct < 100) {
        progressFill.classList.add('active');
      } else {
        progressFill.classList.remove('active');
      }
    }

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      errorBox.hidden = true;
      successBox.hidden = true;
      convertBtn.disabled = true;
      progressSection.hidden = false;
      setProgress(5, 'Uploading file…');

      const formData = new FormData();
      formData.append('file', selectedFile);

      const endpoint = TAB_CONFIG[activeTab].endpoint;
      let job_id;
      try {
        const res = await fetch(endpoint, { method: 'POST', body: formData });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || `Upload failed (${res.status})`);
        }
        job_id = (await res.json()).job_id;
      } catch (err) {
        showError(err.message);
        convertBtn.disabled = false;
        return;
      }

      const es = new EventSource(`/stream/${job_id}`);

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        setProgress(data.pct, data.step);

        if (data.error) {
          es.close();
          showError(data.error);
          convertBtn.disabled = false;
          return;
        }

        if (data.done) {
          es.close();
          progressFill.classList.remove('active');
          successBox.textContent = 'Done! Your download has started.';
          successBox.hidden = false;
          convertBtn.disabled = false;
          const a = document.createElement('a');
          a.href = `/download/${job_id}`;
          document.body.appendChild(a);
          a.click();
          a.remove();
        }
      };

      es.onerror = () => {
        es.close();
        showError('Connection lost during conversion. Please try again.');
        convertBtn.disabled = false;
      };
    });

    function showError(msg) {
      progressSection.hidden = true;
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }
  </script>
</body>
</html>
